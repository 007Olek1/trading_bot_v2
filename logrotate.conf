# Конфигурация ротации логов для Trading Bot V4.0 MTF
# Автоматически ротирует логи, чтобы не занимали много места

/root/trading_bot_v4_mtf/logs/*.log {
    # Ротация каждый день
    daily
    
    # Хранить последние 7 дней
    rotate 7
    
    # Сжимать старые логи
    compress
    delaycompress
    
    # Не ругаться если лог файл отсутствует
    missingok
    
    # Не ротировать пустые файлы
    notifempty
    
    # Создавать новый файл с правами 644
    create 644 root root
    
    # Действия после ротации
    postrotate
        # Перезапускаем бота чтобы он начал писать в новый файл
        systemctl reload trading-bot.service > /dev/null 2>&1 || true
    endscript
}

# Ротация логов сделок (JSON)
/root/trading_bot_v4_mtf/logs/trades.json {
    # Ротация каждую неделю
    weekly
    
    # Хранить последние 4 недели
    rotate 4
    
    # Сжимать
    compress
    delaycompress
    
    missingok
    notifempty
    
    create 644 root root
}

# Ротация логов тестирования
/root/trading_bot_v4_mtf/testing/logs/*.log {
    # Ротация раз в месяц
    monthly
    
    # Хранить 3 месяца
    rotate 3
    
    compress
    delaycompress
    
    missingok
    notifempty
    
    create 644 root root
}
